<div
    class="{{field.className}}"
    id="data-widget"
    [class.adf-invalid]="dateInputControl.invalid && dateInputControl.touched"
    [class.adf-left-label-input-container]="field.leftLabels"
>
    @if (field.leftLabels) {
        <div>
            <label class="adf-left-label" [attr.for]="field.id"
                >{{field.name | translate }} ({{field.dateDisplayFormat}})</label
            >
        </div>
    }
    <div class="adf-date-widget-container">
        <mat-form-field class="adf-date-widget adf-form-field-input" [class.adf-left-label-input-datepicker]="field.leftLabels">
            @if ( (field.name || field?.required) && !field.leftLabels) {
                <mat-label>
                    {{field.name | translate }} ({{field.dateDisplayFormat}})
                </mat-label>
            }
            <input
                matInput
                class="adf-input"
                [matDatetimepicker]="datetimePicker"
                [id]="field.id"
                [formControl]="dateInputControl"
                [placeholder]="field.placeholder"
                [required]="field.required && field.isVisible"
                [min]="minDate"
                [max]="maxDate"
                [title]="field.tooltip"
            />
            <mat-datetimepicker-toggle matSuffix [for]="datetimePicker" [disabled]="field.readOnly" />
            <mat-datetimepicker #datetimePicker type="date" [startAt]="startAt" [disabled]="field.readOnly" />
            <mat-error *ngIf="dateInputControl.invalid && dateInputControl.touched && field.validationSummary?.isActive()">
                {{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}
            </mat-error>
        </mat-form-field>
    </div>
</div>
