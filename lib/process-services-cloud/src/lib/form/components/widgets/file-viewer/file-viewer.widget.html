<div class="adf-file-viewer-widget {{field.className}}" [class.adf-invalid]="!field.isValid"
    [class.adf-readonly]="field.readOnly">
    <label [attr.for]="field.id">{{field.name | translate }}<span class="adf-asterisk"
                                                                    [style.visibility]="isRequired() ? 'visible' : 'hidden'">*</span></label>
    <adf-alfresco-viewer [overlayMode]="false" [nodeId]="field.value" [showViewer]="field.value" [allowGoBack]="false" />
    <div class="adf-error-message"
         role="alert"
         aria-live="polite"
         *ngIf="field.validationSummary?.isActive()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
    </div>
</div>
