<div
    class="adf-dropdown-widget {{field.className}}"
    [class.adf-invalid]="!field.isValid && isTouched()"
    [class.adf-readonly]="field.readOnly"
    [class.adf-left-label-input-container]="field.leftLabels"
>
    <div *ngIf="field.leftLabels">
        <label class="adf-left-label" [attr.for]="field.id"
            >{{field.name | translate }}</label
        >
    </div>
    <div>
        <adf-cloud-group
            [mode]="mode"
            [title]="title"
            [readOnly]="field.readOnly"
            [validate]="validate"
            [roles]="roles"
            [searchGroupsControl]="search"
            [required]="field.required"
            (changedGroups)="onChangedGroup($event)"
            [preSelectGroups]="preSelectGroup"
            (blur)="markAsTouched()"
            [attr.title]="field.tooltip"
            [label] = "field.name | translate"
        />
        <div class="adf-error-message"
             role="alert"
             aria-live="polite"
             *ngIf="field.validationSummary?.isActive()">
            <mat-icon data-automation-id="adf-field-error-icon">error_outline</mat-icon>
            <span data-automation-id="adf-field-error-text">{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
        </div>
        <div class="adf-dropdown-required-message adf-error-message"
             role="alert"
             aria-live="polite"
             *ngIf="isInvalidFieldRequired() && isTouched()">
            <mat-icon>error_outline</mat-icon>
            <span>{{ 'FORM.FIELD.REQUIRED' | translate }}</span>
        </div>
    </div>
</div>
