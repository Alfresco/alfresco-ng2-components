@if (pagination?.hasMoreItems || isLoading) {
  <div class="adf-infinite-pagination">
    @if (!isLoading) {
      <button mat-button
        class="adf-infinite-pagination-load-more"
        (click)="onLoadMore()"
        data-automation-id="adf-infinite-pagination-button">
        <ng-content />
      </button>
    }
    @if (isLoading) {
      <mat-progress-bar
        mode="indeterminate"
        class="adf-infinite-pagination-spinner"
        data-automation-id="adf-infinite-pagination-spinner"
        [attr.aria-label]="'DATA_LOADING' | translate" />
    }
  </div>
}
