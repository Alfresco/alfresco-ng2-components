<div @tooltip class="adf-tooltip-card" [style.width.px]="width">
  @if (image ) {
    <img [src]="image" [width]="width" alt="{{text}}">
  }
  @if (image) {
    <hr />
  }
  @if (text) {
    <p>{{text}}</p>
  }
  @if (htmlContent) {
    <div [innerHTML]="sanitizedHtmlContent()" class="adf-tooltip-card-content"></div>
  }
</div>
