<div [ngClass]="field.className"
     [class.adf-invalid]="!field.isValid && isTouched()" class="adf-checkbox-widget-container"
>
    <mat-checkbox [id]="field.id"
                  class="adf-checkbox"
                  [required]="isRequired()"
                  [disabled]="field.readOnly || readOnly"
                  [(ngModel)]="field.value"
                  (ngModelChange)="onFieldChanged(field)"
                  [title]="field.tooltip"
                  (click)="markAsTouched()"
                  >
        {{ field.name | translate }}
    </mat-checkbox>
    <div class="adf-error-message" role="alert" aria-live="polite" *ngIf="field.validationSummary?.isActive()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
    </div>
    <div class="adf-error-message" role="alert" aria-live="polite" *ngIf="isInvalidFieldRequired() && isTouched()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ 'FORM.FIELD.REQUIRED' | translate }}</span>
    </div>
</div>
