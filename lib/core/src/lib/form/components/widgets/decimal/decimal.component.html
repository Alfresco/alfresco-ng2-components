<div class="adf-textfield adf-decimal-widget {{ field.className }}"
     [class.adf-invalid]="!field.isValid && isTouched()"
     [class.adf-readonly]="field.readOnly"
     [class.adf-left-label-input-container]="field.leftLabels">
    <div *ngIf="field.leftLabels">
        <label class="adf-left-label" [attr.for]="field.id">
            {{ field.name | translate }}
        </label>
    </div>

    <div class="adf-decimal-widget-container">
        <mat-form-field class="adf-form-field-input" [floatLabel]="field.placeholder ? 'always' : null" subscriptSizing="dynamic">
           @if ( (field.name || field?.required) && !field.leftLabels) { <mat-label>{{ field.name | translate }}</mat-label> }
            <input matInput
                   class="adf-input"
                   type="text"
                   pattern="-?[0-9]*(\.[0-9]*)?"
                   [id]="field.id"
                   [required]="field.required && field.isVisible"
                   [(ngModel)]="field.value"
                   (ngModelChange)="onFieldChanged(field)"
                   [disabled]="field.readOnly"
                   [placeholder]="field.placeholder"
                   [title]="field.tooltip"
                   [errorStateMatcher]="errorStateMatcher"
                   (blur)="onBlur()" />
            @if (field.validationSummary?.isActive()) {
                <mat-error>
                    {{ field.validationSummary.message | translate:translateParameters }}
                </mat-error>
            }
            @if (isInvalidFieldRequired() && isTouched()) {
                <mat-error>
                    {{ 'FORM.FIELD.REQUIRED' | translate }}
                </mat-error>
            }
        </mat-form-field>
    </div>
</div>
