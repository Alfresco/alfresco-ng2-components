<div class="adf-base-viewer-widget {{ field.className }}"
     [class.adf-invalid]="!field.isValid"
     [class.adf-readonly]="field.readOnly">
    <label [attr.for]="field.id">
        {{ field.name | translate }}
    </label>
    <adf-viewer [urlFile]="field.value.urlFile"
                [blobFile]="field.value.blobFile"
                [fileName]="field.value.fileName"
                [showViewer]="field.value?.blobFile || field.value?.urlFile"
                [allowGoBack]="false" />
    <div class="adf-error-message" role="alert" aria-live="polite" *ngIf="field.validationSummary?.isActive()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
    </div>
</div>
