<div class="adf-textfield adf-text-widget {{ field.className }}"
     [class.adf-invalid]="!field.isValid && isTouched()"
     [class.adf-readonly]="field.readOnly"
     [class.adf-left-label-input-container]="field.leftLabels">
    <div *ngIf="field.leftLabels">
        <label class="adf-left-label" [attr.for]="field.id">
            {{ field.name | translate }}
        </label>
    </div>
    <div class="adf-text-widget-container">
        <mat-form-field class="adf-form-field-input" [floatLabel]="placeholder ? 'always' : null" subscriptSizing="dynamic">
            @if ( (field.name || this.field?.required) && !field.leftLabels) { <mat-label data-automation-id="adf-field-label">
                {{ field.name | translate }}
            </mat-label>
        }
            <input matInput
                   class="adf-input"
                   type="text"
                   [id]="field.id"
                   [required]="field.required"
                   [value]="field.value"
                   [(ngModel)]="field.value"
                   (ngModelChange)="onTextFieldChanged()"
                   [disabled]="field.readOnly || readOnly"
                   [textMask]="{mask: mask, isReversed: isMaskReversed}"
                   [placeholder]="placeholder"
                   [title]="field.tooltip"
                   [errorStateMatcher]="errorStateMatcher"
                   (blur)="onBlur()">
            <mat-error data-automation-id="adf-field-error" *ngIf="field.validationSummary?.isActive()">
                {{ field.validationSummary.message | translate:translateParameters }}
            </mat-error>
            <mat-error *ngIf="isInvalidFieldRequired() && isTouched()">
                {{ 'FORM.FIELD.REQUIRED' | translate }}
            </mat-error>
        </mat-form-field>
        <ng-container *ngTemplateOutlet="fieldStatusTemplate ?? null; context: { $implicit: this }" />
    </div>
</div>
