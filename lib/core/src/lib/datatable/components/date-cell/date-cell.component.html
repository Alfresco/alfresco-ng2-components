@let date = value$ | async;

@if (date) {
    <span [title]="tooltip ? tooltip : computedTitle" class="adf-datatable-cell-value">
        @if (config.format === 'timeAgo') {
            {{ date | adfTimeAgo: config.locale }}
        } @else {
            {{ date | adfLocalizedDate: config.format: config.locale }}
        }
    </span>
}
