<div class="adf-upload-widget {{field.className}}" [class.adf-invalid]="!field.isValid" [class.adf-readonly]="field.readOnly">
    <label [attr.for]="field.id">{{field.name | translate }}</label>
    <div class="adf-upload-widget-container">
        <div>
            <mat-list *ngIf="hasFile">
                <mat-list-item class="adf-upload-files-row" *ngFor="let file of field.value">
                    <img
                        matListItemLine
                        class="adf-upload-widget__icon"
                        [id]="'file-'+file.id+'-icon'"
                        [src]="getIcon(file.mimeType)"
                        [alt]="mimeTypeIcon"
                        (click)="fileClicked(file)"
                        (keyup.enter)="fileClicked(file)"
                        role="button"
                        tabindex="0"
                    />
                    <span
                        matListItemLine
                        id="{{'file-'+file.id}}"
                        (click)="fileClicked(file)"
                        (keyup.enter)="fileClicked(file)"
                        role="button"
                        tabindex="0"
                        class="adf-file"
                        >{{file.name}}</span
                    >
                    <button
                        *ngIf="!field.readOnly"
                        mat-icon-button
                        [id]="'file-'+file.id+'-remove'"
                        (click)="removeFile(file);"
                        (keyup.enter)="removeFile(file);"
                    >
                        <mat-icon class="mat-24">highlight_off</mat-icon>
                    </button>
                </mat-list-item>
            </mat-list>
        </div>

        <div *ngIf="(!hasFile || multipleOption) && !field.readOnly">
            <button mat-raised-button (click)="uploadFiles.click()"
                [attr.aria-required]="isRequired() ? 'true' : null"
                [attr.aria-invalid]="!field.isValid ? 'true' : null">
                {{ 'FORM.FIELD.UPLOAD' | translate }}<mat-icon>file_upload</mat-icon>
                <input #uploadFiles [multiple]="multipleOption" type="file" [id]="field.id" (change)="onFileChanged($event)" />
            </button>
        </div>
    </div>
    <div class="adf-error-message" role="alert" aria-live="polite" *ngIf="field.validationSummary?.isActive()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
    </div>
    <div class="adf-error-message" role="alert" aria-live="polite" *ngIf="isInvalidFieldRequired()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ 'FORM.FIELD.REQUIRED' | translate }}</span>
    </div>
</div>
