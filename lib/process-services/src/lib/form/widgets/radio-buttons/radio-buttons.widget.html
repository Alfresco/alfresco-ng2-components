<div class="adf-radio-buttons-widget {{field.className}}" [class.adf-readonly]="field.readOnly" [id]="field.id">
    <div class="adf-radio-button-container">
        <label [attr.for]="field.id" data-automation-id="adf-field-label">{{field.name | translate }}</label>
        <mat-radio-group
            class="adf-radio-group"
            [(ngModel)]="field.value"
            [disabled]="field.readOnly"
            [required]="isRequired()"
            [attr.aria-required]="isRequired() ? 'true' : null"
            [attr.aria-invalid]="field.validationSummary?.isActive() ? 'true' : null">
            <mat-radio-button
                [title]="field.tooltip"
                [id]="field.id + '-' + opt.id"
                [name]="field.id"
                [value]="opt.id"
                [checked]="field.value === opt.id"
                (change)="onOptionClick(opt.id)"
                class="adf-radio-button"
                *ngFor="let opt of field.options"
            >
                {{opt.name}}
            </mat-radio-button>
        </mat-radio-group>
    </div>
    <div class="adf-error-message adf-radio-group-error-message" role="alert" aria-live="polite" *ngIf="field.validationSummary?.isActive()">
        <mat-icon>error_outline</mat-icon>
        <span>{{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}</span>
    </div>
</div>
