<div class="dropdown-editor">
  <label [attr.for]="column.id">{{column.name}}</label>
  <mat-form-field>
    <mat-select
      floatPlaceholder="never"
      class="adf-dropdown-editor-select"
      [id]="column.id"
      [(ngModel)]="value"
      [required]="column.required"
      [disabled]="!column.editable"
      (selectionChange)="onValueChanged(row, column, $event)">
      <mat-option />
      @for (opt of options; track opt) {
        <mat-option [value]="opt.name" [id]="opt.id">{{opt.name}}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  @for (opt of options; track opt) {
    <span id="testme">{{opt | json}}</span>
  }
</div>
