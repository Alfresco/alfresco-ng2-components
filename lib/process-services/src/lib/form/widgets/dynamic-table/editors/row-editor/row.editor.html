<div class="row-editor mdl-shadow--2dp"
  [class.row-editor__invalid]="!validationSummary.isValid">
  @for (column of table.columns; track column) {
    <div class="mdl-grid">
      <div class="mdl-cell mdl-cell--6-col">
        @switch (column.type) {
          @case ('Dropdown') {
            <div>
              <adf-dropdown-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
          @case ('Date') {
            <div>
              <adf-date-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
          @case ('Datetime') {
            <div>
              <adf-datetime-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
          @case ('Boolean') {
            <div>
              <adf-boolean-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
          @case ('Amount') {
            <div>
              <adf-amount-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
          @default {
            <div>
              <adf-text-editor
                [table]="table"
                [row]="row"
                [column]="column" />
            </div>
          }
        }
      </div>
    </div>
  }
  <error-widget [error]="validationSummary" />
  <div>
    <button mat-button (click)="onCancelChanges()">Cancel</button>
    <button mat-button (click)="onSaveChanges()">Save</button>
  </div>
</div>
