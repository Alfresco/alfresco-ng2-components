<div class="adf-typeahead-widget-container">
    <div class="adf-typeahead-widget {{field.className}}"
        [class.is-dirty]="value"
        [class.adf-invalid]="!field.isValid"
        [class.adf-readonly]="field.readOnly"
        id="typehead-div">
        <mat-form-field>
            <mat-label data-automation-id="adf-field-label">{{field.name | translate }}</mat-label>
            <input matInput class="adf-input"
                   type="text"
                   [id]="field.id"
                   [(ngModel)]="value"
                   (ngModelChange)="validate()"
                   (keyup)="onKeyUp($event)"
                   [disabled]="field.readOnly"
                   [required]="isRequired()"
                   data-automation-id="adf-typeahed-search-input"
                   placeholder="{{field.placeholder}}"
                   [matAutocomplete]="auto">
            <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onItemSelect($event.option.value)">
                <mat-option *ngFor="let item of options; let i = index" id="adf-typeahed-widget-user-{{i}}" [value]="item">
                    <span id="adf-typeahed-label-name">{{item.name}}</span>
                </mat-option>
            </mat-autocomplete>
            <mat-error data-automation-id="adf-field-error" *ngIf="field.validationSummary?.isActive()">
                {{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}
            </mat-error>
            <mat-error *ngIf="isInvalidFieldRequired()">
                {{ 'FORM.FIELD.REQUIRED' | translate }}
            </mat-error>
        </mat-form-field>
    </div>
</div>
