<div
    class="adf-dropdown-widget {{field.className}}"
    [class.adf-invalid]="dropdownControl.invalid && dropdownControl.touched"
    [class.adf-readonly]="field.readOnly"
>
    <mat-form-field>
        <mat-label data-automation-id="adf-field-label">{{field.name | translate }}</mat-label>
        <mat-select class="adf-select" [id]="field.id" [formControl]="dropdownControl" [required]="isRequired()">
            <mat-option *ngFor="let opt of field.options" [value]="opt" [id]="opt.id">{{opt.name}}</mat-option>
            <mat-option id="readonlyOption" *ngIf="dropdownControl.disabled" [value]="field.value">{{field.value}}</mat-option>
        </mat-select>
        <mat-error *ngIf="!isReadOnlyField && dropdownControl.touched && field.validationSummary?.isActive()">
            {{ field.validationSummary.message | translate:field.validationSummary.getAttributesAsJsonObj() }}
        </mat-error>
    </mat-form-field>
</div>
