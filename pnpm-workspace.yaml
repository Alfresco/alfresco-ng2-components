packages:
  - 'lib/eslint-angular'

# Block packages published less than 3 days ago (4320 minutes)
minimumReleaseAge: 4320
minimumReleaseAgeStrict: true

overrides:
  # Security fixes
  serialize-javascript: '>=7.0.5'
  picomatch: '>=4.0.4'
  tmp: '>=0.2.6'
  ws: '>=8.20.1'
  path-to-regexp: '>=0.1.13'
  postcss: '>=8.5.10'
  webpack-dev-server: '>=5.2.4'
  uuid: '>=11.1.1'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true
  sharp: true
  node-sass: true
  sass: true
  pdfjs-dist: true
  canvas: true
  bcrypt: true
  sqlite3: true
  better-sqlite3: true
  puppeteer: true
  playwright: true
  fsevents: true
  husky: true
  core-js: true
  core-js-pure: true
  '@esbuild/darwin-arm64': true
  '@esbuild/darwin-x64': true
  '@esbuild/linux-x64': true
  '@esbuild/win32-x64': true
  '@nx/nx-darwin-arm64': true
  '@nx/nx-darwin-x64': true
  '@nx/nx-linux-x64-gnu': true
  '@nx/nx-linux-x64-musl': true
  '@nx/nx-win32-x64-msvc': true
  '@swc/core': true
  less: set this to true or false
